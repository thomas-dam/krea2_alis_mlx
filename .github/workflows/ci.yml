name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: lint + compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install --upgrade ruff
      - name: Ruff (pyflakes + syntax)
        run: ruff check .
      - name: Byte-compile all sources
        run: python -m compileall -q krea2 app.py generate.py validation

  smoke:
    name: import + input-validation (Apple silicon)
    runs-on: macos-14            # arm64 (M-series) runner — MLX needs Apple silicon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package (inference deps only)
        run: python -m pip install -e .
      - name: Import the package
        run: python -c "import krea2; print('krea2 exports:', krea2.__all__)"
      - name: Input-validation test (no weights, no download)
        run: python validation/test_input_validation.py
